apiVersion: apps/v1
kind: Deployment
metadata:
  name: angular-ag-grid-transaction-demo
  labels:
    app: angular-ag-grid-transaction-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: angular-ag-grid-transaction-demo
  template:
    metadata:
      labels:
        app: angular-ag-grid-transaction-demo
    spec:
      containers:
        - name: angular-ag-grid-transaction-demo
          image: kamranqayyum94/angular-ag-grid-transaction-demo:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
