apiVersion: v1
kind: Service
metadata:
  name: angular-graphql-dashboard
  labels:
    app: angular-graphql-dashboard
spec:
  type: LoadBalancer
  selector:
    app: angular-graphql-dashboard
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP

