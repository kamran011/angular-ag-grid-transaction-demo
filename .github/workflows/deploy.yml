name: CI/CD

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            kamranqayyum94/angular-ag-grid-transaction-demo:latest
            kamranqayyum94/angular-ag-grid-transaction-demo:sha-${{ github.sha }}

      - name: Print Kubernetes deploy command
        shell: bash
        run: |
          echo "kubectl apply -f k8s/deployment.yml"
          echo "kubectl apply -f k8s/service.yml"

